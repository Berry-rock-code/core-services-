spring:
  application:
    name: integration-hub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

integration:
  vendor:
    buildium:
      enabled: ${BUILDIUM_ENABLED:true}
      base-url: ${BUILDIUM_BASE_URL:https://api.buildium.com}
      client-id: ${BUILDIUM_CLIENT_ID:}
      client-secret: ${BUILDIUM_CLIENT_SECRET:}
      connect-timeout-seconds: ${BUILDIUM_CONNECT_TIMEOUT_SECONDS:10}
      read-timeout-seconds: ${BUILDIUM_READ_TIMEOUT_SECONDS:30}
      page-size: ${BUILDIUM_PAGE_SIZE:100}

    google-sheets:
      enabled: ${GOOGLE_SHEETS_ENABLED:true}
      application-name: ${GOOGLE_SHEETS_APPLICATION_NAME:integration-hub}
      spreadsheet-id: ${GOOGLE_SHEETS_SPREADSHEET_ID:}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}

    salesforce:
      enabled: ${SALESFORCE_ENABLED:false}
      login-url: ${SALESFORCE_LOGIN_URL:https://login.salesforce.com}
      client-id: ${SALESFORCE_CLIENT_ID:}
      username: ${SALESFORCE_USERNAME:}
      private-key-path: ${SALESFORCE_PRIVATE_KEY_PATH:}
      api-version: ${SALESFORCE_API_VERSION:v61.0}
      token-skew-seconds: ${SALESFORCE_TOKEN_SKEW_SECONDS:60}
      fields:
        id: ${SALESFORCE_FIELD_ID:Id}
        full-address: ${SALESFORCE_FIELD_FULL_ADDRESS:New_Purchase_Address__Street__s}
        city: ${SALESFORCE_FIELD_CITY:New_Purchase_Address__City__s}
        state: ${SALESFORCE_FIELD_STATE:New_Purchase_Address__StateCode__s}
        postal-code: ${SALESFORCE_FIELD_POSTAL_CODE:New_Purchase_Address__PostalCode__s}
        country-code: ${SALESFORCE_FIELD_COUNTRY_CODE:New_Purchase_Address__CountryCode__s}
        stage: ${SALESFORCE_FIELD_STAGE:StageName}

address:
  pipeline:
    enabled: ${ADDRESS_PIPELINE_ENABLED:false}
    dry-run: ${ADDRESS_PIPELINE_DRY_RUN:true}
    sheet-id: ${ADDRESS_PIPELINE_SHEET_ID:}
    sheet-name: ${ADDRESS_PIPELINE_SHEET_NAME:Loan Tape}
    header-row: ${ADDRESS_PIPELINE_HEADER_ROW:2}
    header:
      address: ${ADDRESS_PIPELINE_HEADER_ADDRESS:Address}
      city: ${ADDRESS_PIPELINE_HEADER_CITY:City}
      state: ${ADDRESS_PIPELINE_HEADER_STATE:State}
      postal-code: ${ADDRESS_PIPELINE_HEADER_POSTAL_CODE:Zip}
      salesforce-id: ${ADDRESS_PIPELINE_HEADER_SALESFORCE_ID:Salesforce ID}
      buildium-id: ${ADDRESS_PIPELINE_HEADER_BUILDIUM_ID:Buildium ID}
      sf-standardized-address: ${ADDRESS_PIPELINE_HEADER_SF_STANDARDIZED_ADDRESS:SF Standardized Address}
      sf-address-quality: ${ADDRESS_PIPELINE_HEADER_SF_ADDRESS_QUALITY:SF Address Quality}
      sf-address-sync-status: ${ADDRESS_PIPELINE_HEADER_SF_ADDRESS_SYNC_STATUS:SF Address Sync Status}
      buildium-lease-id: ${ADDRESS_PIPELINE_HEADER_BUILDIUM_LEASE_ID:Buildium lease ID}
      buildium-property-id: ${ADDRESS_PIPELINE_HEADER_BUILDIUM_PROPERTY_ID:Buildium Property ID}