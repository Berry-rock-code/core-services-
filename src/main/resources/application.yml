spring:
  application:
    name: integration-hub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

integration:
  vendor:
    buildium:
      enabled: true
      base-url: ${BUILDIUM_BASE_URL:https://api.buildium.com}
      client-id: ${BUILDIUM_CLIENT_ID:}
      client-secret: ${BUILDIUM_CLIENT_SECRET:}
      connect-timeout-seconds: ${BUILDIUM_CONNECT_TIMEOUT_SECONDS:10}
      read-timeout-seconds: ${BUILDIUM_READ_TIMEOUT_SECONDS:30}
      page-size: 100

    google-sheets:
      enabled: true
      application-name: ${GOOGLE_SHEETS_APPLICATION_NAME:integration-hub}
      spreadsheet-id: ${GOOGLE_SHEETS_SPREADSHEET_ID:}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}

    salesforce:
      enabled: true
      login-url: https://login.salesforce.com
      client-id: ${SALESFORCE_CLIENT_ID:}
      username: ${SALESFORCE_USERNAME:}
      private-key-path: ${SALESFORCE_PRIVATE_KEY_PATH:}
      api-version: v61.0
      token-skew-seconds: ${SALESFORCE_TOKEN_SKEW_SECONDS:60}
      fields:
        id: Id
        full-address: New_Purchase_Address__Street__s
        city: New_Purchase_Address__City__s
        state: New_Purchase_Address__StateCode__s
        postal-code: New_Purchase_Address__PostalCode__s
        country-code: New_Purchase_Address__CountryCode__s
        stage: StageName

address:
  pipeline:
    enabled: true
    dry-run: true
    sheet-id: ${GOOGLE_SHEETS_SPREADSHEET_ID:}
    sheet-name: ${GOOGLE_SHEETS_SHEET_NAME:}
    header-row: 2
    header:
      address: Address
      city: City
      state: State
      postal-code: Zip
      salesforce-id: Salesforce ID
      buildium-id: Buildium ID
      sf-standardized-address: SF Standardized Address
      sf-address-quality: SF Address Quality
      sf-address-sync-status: SF Address Sync Status
      buildium-lease-id: Buildium lease ID
      buildium-property-id: Buildium Property ID